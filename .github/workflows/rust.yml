name: rust-baseline

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-baseline::${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  rust-baseline:
    name: Run Rust baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve target metadata
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          {
            echo "### Rust baseline"
            echo
            echo "- Target ref: \`${GITHUB_REF_NAME}\`"
            echo "- Target SHA: \`${target_sha}\`"
            echo "- Setup class: \`curated stdio MCP server\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Check package metadata
        run: cargo metadata --locked --no-deps --format-version 1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
